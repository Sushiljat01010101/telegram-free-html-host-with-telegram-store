services:
  - type: web
    name: telegram-html-host
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node bot.cjs
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_STORAGE_CHANNEL_ID
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NODE_ENV
        value: production
